    <style>
      :root {
        font-family: monospace;
        color: #f5f5f5;
        background: #0d0d0d;
      }

        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

        margin: 0;
        font-size: clamp(4rem, 15vw, 10rem);
        line-height: 1;
      }

      p {
        margin-top: 1rem;
        opacity: 0.7;
      }

      a {
        display: inline-block;
        margin-top: 2rem;
        color: inherit;
      }
    </style>
  </head>

  <body>

      <h1>404</h1>
